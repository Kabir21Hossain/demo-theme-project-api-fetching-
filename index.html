<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IssueTrack — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-body">
  <!-- Animated background grid -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="min-h-screen flex items-center justify-center px-4 relative z-10">
    <div class="login-card w-full max-w-md">
      <!-- Logo & Title -->
      <div class="text-center mb-8">
        <div class="logo-wrap mx-auto mb-4">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="12" fill="url(#logoGrad)"/>
            <circle cx="24" cy="16" r="5" fill="white" opacity="0.9"/>
            <circle cx="24" cy="16" r="2.5" fill="#0f172a"/>
            <path d="M14 34c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
            <circle cx="34" cy="28" r="4" fill="#22c55e"/>
            <circle cx="14" cy="28" r="4" fill="#a855f7"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="text-3xl font-bold tracking-tight login-title">IssueTrack</h1>
        <p class="login-subtitle mt-2 text-sm">GitHub Issues Management Dashboard</p>
      </div>

      <!-- Login Form -->
      <div class="login-form-box">
        <h2 class="text-lg font-semibold mb-6 text-center" style="color: var(--text-primary)">Sign in to your account</h2>

        <div id="loginError" class="alert alert-error mb-4 hidden">
          <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-5 w-5" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          <span>Invalid username or password. Please try again.</span>
        </div>

        <div class="form-group mb-4">
          <label class="label" for="username">
            <span class="label-text font-medium" style="color: var(--text-secondary)">Username</span>
          </label>
          <input
            id="username"
            type="text"
            placeholder="Enter your username"
            class="input input-bordered w-full login-input"
            autocomplete="username"
          />
        </div>

        <div class="form-group mb-6">
          <label class="label" for="password">
            <span class="label-text font-medium" style="color: var(--text-secondary)">Password</span>
          </label>
          <div class="relative">
            <input
              id="password"
              type="password"
              placeholder="Enter your password"
              class="input input-bordered w-full login-input pr-12"
              autocomplete="current-password"
            />
            <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 eye-btn">
              <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
            </button>
          </div>
        </div>

        <button id="loginBtn" class="btn w-full login-btn font-semibold text-base">
          <span id="loginBtnText">Sign In</span>
          <span id="loginSpinner" class="loading loading-spinner loading-sm hidden"></span>
        </button>

        <!-- Demo Credentials -->
        <div class="demo-creds mt-6">
          <p class="text-xs font-semibold mb-2 uppercase tracking-widest" style="color: var(--text-muted)">Demo Credentials</p>
          <div class="demo-creds-box">
            <div class="flex justify-between items-center">
              <span style="color: var(--text-muted)" class="text-sm">Username:</span>
              <code class="demo-code">admin</code>
            </div>
            <div class="flex justify-between items-center mt-1">
              <span style="color: var(--text-muted)" class="text-sm">Password:</span>
              <code class="demo-code">admin123</code>
            </div>
          </div>
          <button id="fillDemoBtn" class="btn btn-sm demo-fill-btn w-full mt-3">
            Use Demo Credentials
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
