<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IssueTrack — Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dashboard-body">
  <!-- Navbar -->
  <nav class="navbar-custom">
    <div class="navbar-inner">
      <!-- Logo -->
      <a href="dashboard.html" class="flex items-center gap-3">
        <div class="nav-logo-icon">
          <svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="12" fill="url(#navLogoGrad)"/>
            <circle cx="24" cy="16" r="5" fill="white" opacity="0.9"/>
            <circle cx="24" cy="16" r="2.5" fill="#0f172a"/>
            <path d="M14 34c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
            <circle cx="34" cy="28" r="4" fill="#22c55e"/>
            <circle cx="14" cy="28" r="4" fill="#a855f7"/>
            <defs>
              <linearGradient id="navLogoGrad" x1="0" y1="0" x2="48" y2="48">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="nav-brand">IssueTrack</span>
      </a>

      <!-- Search -->
      <div class="nav-search-wrap">
        <div class="search-box">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            id="searchInput"
            type="text"
            placeholder="Search issues..."
            class="search-input"
          />
          <button id="searchBtn" class="search-btn">Search</button>
          <button id="clearSearchBtn" class="clear-search-btn hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <!-- User Menu -->
      <div class="nav-user">
        <div class="user-avatar">A</div>
        <span class="user-name hidden sm:inline">admin</span>
        <button id="logoutBtn" class="logout-btn" title="Logout">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Stats Row -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-icon all-icon">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
        </div>
        <div>
          <p class="stat-label">Total Issues</p>
          <p class="stat-value" id="totalCount">—</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon open-icon">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01"/>
          </svg>
        </div>
        <div>
          <p class="stat-label">Open</p>
          <p class="stat-value open-val" id="openCount">—</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon closed-icon">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div>
          <p class="stat-label">Closed</p>
          <p class="stat-value closed-val" id="closedCount">—</p>
        </div>
      </div>
    </div>

    <!-- Issues Section -->
    <div class="issues-section">
      <!-- Tab Header -->
      <div class="tab-header">
        <!-- Tabs -->
        <div class="tabs-wrap">
          <button class="tab-btn active" data-tab="all" id="tabAll">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
            </svg>
            All Issues
            <span class="tab-badge" id="badgeAll">0</span>
          </button>
          <button class="tab-btn" data-tab="open" id="tabOpen">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01"/>
            </svg>
            Open
            <span class="tab-badge open-badge" id="badgeOpen">0</span>
          </button>
          <button class="tab-btn" data-tab="closed" id="tabClosed">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Closed
            <span class="tab-badge closed-badge" id="badgeClosed">0</span>
          </button>
        </div>

        <!-- Status markers -->
        <div class="status-markers">
          <span class="marker open-marker">
            <span class="marker-dot open-dot"></span> Open
          </span>
          <span class="marker closed-marker">
            <span class="marker-dot closed-dot"></span> Closed
          </span>
        </div>
      </div>

      <!-- Search result info -->
      <div id="searchInfo" class="search-info hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <span id="searchInfoText">Search results for: ""</span>
      </div>

      <!-- Spinner -->
      <div id="loadingSpinner" class="loading-wrap">
        <div class="spinner-ring"></div>
        <p class="spinner-text">Loading issues...</p>
      </div>

      <!-- Issue Grid -->
      <div id="issuesGrid" class="issues-grid hidden"></div>

      <!-- Empty State -->
      <div id="emptyState" class="empty-state hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p class="text-lg font-semibold">No issues found</p>
        <p class="text-sm mt-1">Try a different search term or filter</p>
      </div>
    </div>
  </main>

  <!-- Issue Detail Modal -->
  <div id="issueModal" class="modal-backdrop hidden">
    <div class="modal-box-custom">
      <!-- Modal Header -->
      <div class="modal-header">
        <div class="flex items-start gap-3 flex-1">
          <div id="modalStatusIcon" class="modal-status-icon open-status-icon">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01"/>
            </svg>
          </div>
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <span id="modalId" class="modal-id-badge">#0</span>
              <span id="modalStatus" class="modal-status-badge open-badge-modal">open</span>
            </div>
            <h2 id="modalTitle" class="modal-title">Issue Title</h2>
          </div>
        </div>
        <button id="closeModal" class="modal-close-btn">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Modal Body -->
      <div class="modal-body">
        <!-- Description -->
        <div class="modal-section">
          <h3 class="modal-section-title">Description</h3>
          <p id="modalDescription" class="modal-description"></p>
        </div>

        <!-- Meta Grid -->
        <div class="modal-meta-grid">
          <div class="modal-meta-item">
            <span class="meta-label">Author</span>
            <div class="flex items-center gap-2">
              <div class="mini-avatar">
                <span id="modalAuthorInitial">A</span>
              </div>
              <span id="modalAuthor" class="meta-value"></span>
            </div>
          </div>
          <div class="modal-meta-item">
            <span class="meta-label">Assignee</span>
            <span id="modalAssignee" class="meta-value"></span>
          </div>
          <div class="modal-meta-item">
            <span class="meta-label">Priority</span>
            <span id="modalPriority" class="meta-value"></span>
          </div>
          <div class="modal-meta-item">
            <span class="meta-label">Created At</span>
            <span id="modalCreatedAt" class="meta-value"></span>
          </div>
          <div class="modal-meta-item">
            <span class="meta-label">Updated At</span>
            <span id="modalUpdatedAt" class="meta-value"></span>
          </div>
        </div>

        <!-- Labels -->
        <div class="modal-section">
          <h3 class="modal-section-title">Labels</h3>
          <div id="modalLabels" class="flex flex-wrap gap-2"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
